<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // This script grabs the current path and redirects to the root with the path as a query parameter
      // GitHub Pages will then load index.html, and we can read the path from there.
      var path = window.location.pathname;
      window.location.href = '/Learning-project/?p=' + path.replace('/Learning-project/', '');
    </script>
  </head>
  <body></body>
</html>
